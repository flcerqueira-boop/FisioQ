    renderResult:(r)=><SingleScore value={r} label="Escore DASH" color={C.yellow} info="0–100 pts. Quanto maior, maior a incapacidade." invert/>
  },
  startback:{
    id:"startback",name:"STarT Back",region:"Coluna",color:C.red,icon:"🩻",
    description:"STarT Back Screening Tool — triagem de prognóstico para dor lombar.",
    score_info:"Total 0–9 pts. Psicossocial 0–5. Classifica: Baixo / Médio / Alto risco.",
    sections:[
      {title:"Últimos 14 dias",questions:[
        {id:"q1",text:"Minha dor nas costas se espalhou para a(s) perna(s) pelo menos uma vez",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q2",text:"Tive dor no ombro ou no pescoço pelo menos uma vez",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q3",text:"Só tenho caminhado pequenas distâncias por causa das costas",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q4",text:"Me vesti mais devagar do que o habitual pelas costas",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q5",text:"Não é seguro para mim ser fisicamente ativo(a) com essa condição",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q6",text:"Pensamentos preocupantes têm passado pela minha cabeça constantemente",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q7",text:"Sinto que minha dor nas costas é terrível e nunca vai melhorar",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q8",text:"Em geral, não tenho aproveitado as coisas boas da vida",options:["Concordo","Discordo"],scores:[1,0]},
        {id:"q9",text:"A dor nas costas me incomodou nas últimas 2 semanas",options:["Nada","Pouco","Moderadamente","Muito","Extremamente"],scores:[0,0,0,0,1]},
      ]},
    ],
    calculate:(a)=>{
      const psy=["q5","q6","q7","q8","q9"];
      const total=Object.values(a).reduce((s,v)=>s+v,0);
      const ps=psy.reduce((s,k)=>s+(a[k]??0),0);
      let risk="Baixo";if(total>=4&&ps>=4)risk="Alto";else if(total>=4)risk="Médio";
      return{total,psychosocial:ps,risk};
    },
    renderResult:(r)=><StartBackResult result={r}/>
  }
};

// ─── QUESTIONNAIRE FORM ───────────────────────────────────────────────────────
const QuestionnaireForm = ({qId,patientName,onDone,onBack}) => {
  const q = QS[qId];
  const [answers, setAnswers] = useState({});
  const [sec, setSec] = useState(0);
  const allQs = q.sections.flatMap(s=>s.questions);
  const answered = Object.keys(answers).length;
  const section = q.sections[sec];
  const secDone = section.questions.every(x=>answers[x.id]!==undefined);
  const allDone = allQs.every(x=>answers[x.id]!==undefined);
  const progress = (answered/allQs.length)*100;
  const setA = (id,score) => setAnswers(p=>({...p,[id]:score}));
  const result = allDone ? q.calculate(answers) : null;

  if(allDone && result!==null) {
    return (
      <div>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>Questionário concluído</h3>
          <p style={{color:C.gray400,fontSize:13}}>{patientName} • {q.name} • {new Date().toLocaleDateString("pt-BR")}</p>
        </div>
        <div style={{background:C.navy,borderRadius:16,padding:24,marginBottom:20}}>{q.renderResult(result)}</div>
        <div style={{background:`${q.color}11`,border:`1px solid ${q.color}22`,borderRadius:12,padding:14,marginBottom:20}}>
          <p style={{color:q.color,fontSize:12,fontWeight:600,marginBottom:2}}>ℹ️ Interpretação</p>
          <p style={{color:C.gray200,fontSize:12}}>{q.score_info}</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={onBack} variant="ghost" full>← Voltar</Btn>
          <Btn onClick={()=>onDone(result)} full>💾 Salvar resultado</Btn>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:q.color,fontWeight:600,fontSize:13}}>{section.title}</span>
          <span style={{color:C.gray400,fontSize:12}}>{answered}/{allQs.length}</span>
        </div>
        <div style={{background:C.navyLight,borderRadius:999,height:4}}>
          <div style={{width:`${progress}%`,height:"100%",background:q.color,borderRadius:999,transition:"width .3s"}}/>
        </div>
        {q.sections.length>1&&(
          <div style={{display:"flex",gap:6,marginTop:8}}>
            {q.sections.map((s,i)=>(
              <div key={i} style={{height:3,flex:1,background:i<sec?q.color:i===sec?`${q.color}66`:C.navyLight,borderRadius:999}}/>
            ))}
          </div>
        )}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12,maxHeight:"52vh",overflowY:"auto",paddingRight:4}}>
        {section.questions.map((ques,qi)=>(
          <div key={ques.id} style={{background:C.navy,border:`1.5px solid ${answers[ques.id]!==undefined?q.color+"55":C.navyLight}`,borderRadius:14,padding:16,transition:"border-color .2s"}}>
            <p style={{fontSize:13,lineHeight:1.6,marginBottom:12}}>
              <span style={{color:q.color,fontWeight:700,marginRight:6}}>{qi+1}.</span>{ques.text}
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {ques.options.map((opt,oi)=>{
                const sel = answers[ques.id]===ques.scores[oi];
                return (
                  <button key={oi} onClick={()=>setA(ques.id,ques.scores[oi])}
                    style={{background:sel?`${q.color}22`:C.navyMid,border:`1.5px solid ${sel?q.color:C.navyLight}`,borderRadius:8,padding:"8px 14px",color:sel?q.color:C.gray200,fontSize:12,fontFamily:"DM Sans,sans-serif",cursor:"pointer",textAlign:"left",transition:"all .15s",fontWeight:sel?600:400}}>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginTop:16}}>
        {sec>0&&<Btn onClick={()=>setSec(s=>s-1)} variant="ghost">←</Btn>}
        <div style={{flex:1}}/>
        {sec<q.sections.length-1
          ?<Btn onClick={()=>setSec(s=>s+1)} disabled={!secDone}>Próxima seção →</Btn>
          :<Btn disabled={!allDone} style={{opacity:allDone?1:.4}}>Ver resultado ✓</Btn>
        }
      </div>
    </div>
  );
};

      const snap = await getDocs(q);
      const list = snap.docs.map(d=>({id:d.id,...d.data(),evals:d.data().evals||[]}));
      setPatients(list);
      if(role==="admin") loadPendingUsers();
    } catch(e){ console.error(e); }
    setLoading(false);
  };

  const loadPendingUsers = async () => {
    try {
      const {collection,getDocs,query,where} = fbFns();
      const q = query(collection(fbDb(),"users"),where("status","==","pending"));
      const snap = await getDocs(q);
      setPendingUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e){ console.error(e); }
  };

  const approveUser = async (uid) => {
    setApprovingId(uid);
    try {
      const {doc,setDoc} = fbFns();
      await setDoc(doc(fbDb(),"users",uid),{status:"approved"},{merge:true});
      // Envia e-mail de aprovação
      const u = pendingUsers.find(p=>p.id===uid);
      if(u&&u.email){
        try {
          await emailjs.send("service_tm0udfi","template_hxr1raj",{
            to_name: u.name||"Profissional",
            email: u.email,
          });
          console.log("E-mail enviado para", u.email);
        } catch(emailErr){ console.error("Erro ao enviar e-mail:", emailErr); }
      }
      setPendingUsers(ps=>ps.filter(p=>p.id!==uid));
    } catch(e){ console.error(e); }
    setApprovingId(null);
  };

  const rejectUser = async (uid) => {
    setApprovingId(uid);
    try {
      const {doc,setDoc} = fbFns();
      await setDoc(doc(fbDb(),"users",uid),{status:"rejected"},{merge:true});
      setPendingUsers(ps=>ps.filter(p=>p.id!==uid));
    } catch(e){ console.error(e); }
    setApprovingId(null);
  };

  const addPatient = async () => {
    if(!newP.name.trim()) return;
    setSaving(true);
    try {
      const {addDoc,collection} = fbFns();
      const ref = await addDoc(collection(fbDb(),"patients"),{
        name:newP.name, age:parseInt(newP.age)||0,
        gender:newP.gender, condition:newP.condition,
        profId:user.uid, evals:[], createdAt:new Date().toISOString()
      });
      setPatients(ps=>[...ps,{id:ref.id,name:newP.name,age:parseInt(newP.age)||0,gender:newP.gender,condition:newP.condition,profId:user.uid,evals:[]}]);
      setNewP({name:"",age:"",gender:"F",condition:""});
      setShowAddModal(false);
    } catch(e){ console.error(e); }
    setSaving(false);
  };

  const saveEval = async (patientId, qId, scoreStr) => {
    const eval_ = {date:new Date().toLocaleDateString("pt-BR"),q:qId,score:scoreStr};
    try {
      const {doc,getDoc,setDoc} = fbFns();
      const ref = doc(fbDb(),"patients",patientId);
      const snap = await getDoc(ref);
      if(snap.exists()){
        const current = snap.data().evals||[];
        await setDoc(ref,{evals:[eval_,...current]},{merge:true});
      }
    } catch(e){ console.error(e); }
    setPatients(ps=>ps.map(p=>p.id===patientId?{...p,evals:[eval_,...(p.evals||[])]}:p));
    if(selectedPatient?.id===patientId) setSelectedPatient(p=>({...p,evals:[eval_,...(p.evals||[])]}));
  };

  const filtered = patients.filter(p=>
    p.name?.toLowerCase().includes(search.toLowerCase())||
    p.condition?.toLowerCase().includes(search.toLowerCase())
  );

  if(selectedPatient) return <PatientProfile patient={selectedPatient} profId={user.uid} onBack={()=>setSelectedPatient(null)} onSaveEval={saveEval}/>;

  const inp = {background:C.navyLight,border:`1px solid ${C.navyLight}`,borderRadius:9,padding:"10px 14px",color:C.white,fontSize:13,fontFamily:"DM Sans,sans-serif",outline:"none",width:"100%"};

  return (
    <div style={{minHeight:"100vh",background:C.navy}}>
      <div style={{background:C.navyMid,borderBottom:`1px solid ${C.navyLight}`,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <Logo size={26}/>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {role==="admin"&&<Badge color={C.orange}>Admin</Badge>}
          <span style={{color:C.gray400,fontSize:12,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</span>
          <Btn onClick={onLogout} variant="ghost" size="sm">Sair</Btn>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
        <div className="fu" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:24}}>
          {[
            {label:"Pacientes",value:patients.length,icon:"👥",color:C.orange},
            {label:"Avaliações",value:patients.reduce((s,p)=>s+(p.evals||[]).length,0),icon:"📋",color:"#3B82F6"},
            {label:"Questionários",value:5,icon:"📊",color:C.green},
          ].map(s=>(
            <div key={s.label} style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:18}}>
              <div style={{fontSize:22}}>{s.icon}</div>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:s.color,marginTop:6}}>{s.value}</div>
              <div style={{color:C.gray400,fontSize:12,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        <div className="fu2">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:10,flexWrap:"wrap"}}>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18}}>Pacientes</h2>
            <div style={{display:"flex",gap:10,flex:1,justifyContent:"flex-end",flexWrap:"wrap"}}>
              <input placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,width:"auto",flex:1,maxWidth:240}}/>
              <Btn onClick={()=>setShowAddModal(true)} size="sm">+ Novo paciente</Btn>
            </div>
          </div>

          {loading
            ?<div style={{textAlign:"center",padding:40,color:C.gray400}}><span className="spinner" style={{margin:"0 auto",display:"block",width:28,height:28}}/></div>
            :filtered.length===0
              ?<div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:32,textAlign:"center",color:C.gray400}}>
                {patients.length===0?"Nenhum paciente cadastrado ainda. Clique em + Novo paciente.":"Nenhum resultado para a busca."}
              </div>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.map(p=>(
                  <div key={p.id} onClick={()=>setSelectedPatient(p)}
                    style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .18s",gap:12}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=`${C.orange}66`;e.currentTarget.style.transform="translateX(2px)"}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.navyLight;e.currentTarget.style.transform="translateX(0)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:40,height:40,borderRadius:10,background:`${C.orange}22`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:17,color:C.orange,flexShrink:0}}>{p.name[0]}</div>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
                        <div style={{color:C.gray400,fontSize:12}}>{p.age} anos • {p.condition}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                      {p.evals&&p.evals[0]&&<Badge color={QS[p.evals[0].q]?.color||C.orange}>{QS[p.evals[0].q]?.name}</Badge>}
                      <span style={{color:C.gray400,fontSize:11}}>{(p.evals||[]).length} aval.</span>
                      <span style={{color:C.gray400,fontSize:16}}>→</span>
                    </div>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>


      {/* painel admin — aprovação de cadastros */}
      {role==="admin"&&(
        <div style={{maxWidth:860,margin:"0 auto",padding:"0 16px 24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18}}>Cadastros Pendentes</h2>
            {pendingUsers.length>0&&(
              <span style={{background:`${C.red}22`,color:C.red,border:`1px solid ${C.red}44`,borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{pendingUsers.length}</span>
            )}
          </div>
          {pendingUsers.length===0
            ?<div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:20,textAlign:"center",color:C.gray400,fontSize:13}}>Nenhum cadastro pendente ✅</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {pendingUsers.map(u=>(
                <div key={u.id} style={{background:C.navyMid,border:`1px solid ${C.yellow}44`,borderRadius:14,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:38,height:38,borderRadius:10,background:`${C.yellow}22`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:16,color:C.yellow,flexShrink:0}}>{u.name?u.name[0]:"?"}</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{u.name||"Sem nome"}</div>
                      <div style={{color:C.gray400,fontSize:12}}>{u.email}</div>
                      <div style={{color:C.gray400,fontSize:11}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString("pt-BR"):""}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <Btn onClick={()=>rejectUser(u.id)} variant="danger" size="sm" loading={approvingId===u.id}>Recusar</Btn>
                    <Btn onClick={()=>approveUser(u.id)} size="sm" loading={approvingId===u.id}>✅ Aprovar</Btn>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>
      )}

      {showAddModal&&(
        <Modal title="Novo paciente" onClose={()=>setShowAddModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input placeholder="Nome completo *" value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))} style={inp}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <input placeholder="Idade" type="number" value={newP.age} onChange={e=>setNewP(p=>({...p,age:e.target.value}))} style={inp}/>
              <select value={newP.gender} onChange={e=>setNewP(p=>({...p,gender:e.target.value}))} style={{...inp,cursor:"pointer"}}>
                <option value="F">Feminino</option><option value="M">Masculino</option>
              </select>
            </div>
            <input placeholder="Condição / diagnóstico" value={newP.condition} onChange={e=>setNewP(p=>({...p,condition:e.target.value}))} style={inp}/>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <Btn onClick={()=>setShowAddModal(false)} variant="ghost" full>Cancelar</Btn>
              <Btn onClick={addPatient} disabled={!newP.name.trim()} loading={saving} full>Cadastrar paciente</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── TELA DE PENDENTE ────────────────────────────────────────────────────────
const PendingScreen = ({onBack}) => (
  <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
    <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>⏳</div>
      <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,marginBottom:12}}>Cadastro em análise</h2>
      <p style={{color:C.gray400,fontSize:14,lineHeight:1.7,marginBottom:24}}>
        Seu cadastro ainda não foi aprovado.<br/>
        O administrador irá revisar sua solicitação<br/>
        e você receberá um aviso em breve.
      </p>
      <div style={{background:`${C.yellow}11`,border:`1px solid ${C.yellow}33`,borderRadius:12,padding:16,marginBottom:24}}>
        <p style={{color:C.yellow,fontSize:13,fontWeight:600,marginBottom:4}}>O que fazer agora?</p>
        <p style={{color:C.gray400,fontSize:13,lineHeight:1.6}}>
          Aguarde o contato do administrador.<br/>
          Tente fazer login novamente após receber a confirmação.
        </p>
      </div>
      <Btn onClick={onBack} variant="ghost" full>← Voltar ao login</Btn>
      <p style={{color:C.gray400,fontSize:11,marginTop:20}}>Desenvolvido pelo Professor Felipe Cerqueira</p>
    </div>
  </div>
);

// ─── LOGIN / CADASTRO ─────────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [mode, setMode] = useState("login"); // login | register
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [name, setName] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const ADMIN_EMAIL = "flcerqueira@gmail.com"; // ← e-mail do admin

  const errMsg = (code) => {
    const map = {
      "auth/user-not-found":"E-mail não encontrado.",
      "auth/wrong-password":"Senha incorreta.",
      "auth/invalid-credential":"E-mail ou senha inválidos.",
      "auth/email-already-in-use":"Este e-mail já está cadastrado.",
      "auth/weak-password":"A senha deve ter pelo menos 6 caracteres.",
      "auth/invalid-email":"E-mail inválido.",
    };
    return map[code]||"Erro: "+code;
  };

  const handleLogin = async () => {
    if(!email||!pass) return setError("Preencha e-mail e senha.");
    setLoading(true); setError("");
    let cred = null;
    try {
      await waitForFirebase();
      const {signInWithEmailAndPassword} = fbFns();
      cred = await signInWithEmailAndPassword(fbAuth(), email, pass);
    } catch(e){ setError(errMsg(e.code)); setLoading(false); return; }

    // Admin entra direto
    if(cred.user.email===ADMIN_EMAIL){ onLogin(cred.user,"admin"); setLoading(false); return; }

    // Verifica aprovação — bloqueia por padrão em qualquer erro
    try {
      const {doc, getDoc, signOut} = fbFns();
      const snap = await getDoc(doc(fbDb(),"users",cred.user.uid));
      const status = snap.exists() ? snap.data().status : "pending";
      if(status !== "approved"){
        await signOut(fbAuth());
        onLogin(null,"pending");
        setLoading(false); return;
      }
      onLogin(cred.user,"professional");
    } catch(e){
      // Erro ao verificar — bloqueia por segurança
      try{ const {signOut}=fbFns(); await signOut(fbAuth()); }catch(_){}
      onLogin(null,"pending");
    }
    setLoading(false);
  };

  const handleRegister = async () => {
    if(!email||!pass||!name) return setError("Preencha todos os campos.");
    if(pass.length<6) return setError("A senha deve ter pelo menos 6 caracteres.");
    setLoading(true); setError("");
    try {
      await waitForFirebase();
      const {createUserWithEmailAndPassword, doc, setDoc, signOut} = fbFns();
      const cred = await createUserWithEmailAndPassword(fbAuth(), email, pass);
      await setDoc(doc(fbDb(),"users",cred.user.uid),{
        name, email, role:"professional",
        status:"pending",
        createdAt:new Date().toISOString()
      });
      await signOut(fbAuth());
      setMode("pending_sent");
      setEmail(""); setPass(""); setName("");
    } catch(e){ setError(errMsg(e.code)); }
    setLoading(false);
  };

  const inp = {background:C.navyLight,border:`1.5px solid ${C.navyLight}`,borderRadius:10,padding:"12px 16px",color:C.white,fontSize:14,fontFamily:"DM Sans,sans-serif",width:"100%",outline:"none"};

  // Tela de cadastro enviado com sucesso
  if(mode==="pending_sent") return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:56,marginBottom:16}}>📬</div>
        <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:22,marginBottom:12}}>Cadastro enviado!</h2>
        <p style={{color:C.gray400,fontSize:14,lineHeight:1.7,marginBottom:24}}>
          Seu cadastro foi recebido com sucesso.<br/>
          Aguarde a aprovação do administrador.<br/>
          Você será notificado assim que sua conta for liberada.
        </p>
        <div style={{background:`${C.orange}11`,border:`1px solid ${C.orange}33`,borderRadius:12,padding:14,marginBottom:24}}>
          <p style={{color:C.orange,fontSize:13}}>⏳ Status: <strong>Aguardando aprovação</strong></p>
        </div>
        <Btn onClick={()=>setMode("login")} variant="ghost" full>← Voltar ao login</Btn>
        <p style={{color:C.gray400,fontSize:11,marginTop:20}}>Desenvolvido pelo Professor Felipe Cerqueira</p>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <Logo size={38}/>
          <p style={{color:C.gray400,fontSize:12,marginTop:8}}>Questionários Funcionais em Fisioterapia</p>
        </div>

        <div style={{display:"flex",gap:6,background:C.navy,borderRadius:11,padding:4,marginBottom:22}}>
          {[["login","Entrar"],["register","Cadastrar"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setMode(v);setError("");}}
              style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:mode===v?C.orange:"transparent",color:mode===v?C.white:C.gray400,fontWeight:600,fontSize:13,fontFamily:"DM Sans,sans-serif",transition:"all .18s"}}>
              {l}
            </button>
          ))}
        </div>

        <Alert msg={error}/>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {mode==="register"&&<input style={inp} placeholder="Nome completo" value={name} onChange={e=>setName(e.target.value)}/>}
          <input style={inp} placeholder="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input style={inp} placeholder="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&(mode==="login"?handleLogin():handleRegister())}/>
          <Btn onClick={mode==="login"?handleLogin:handleRegister} size="lg" full loading={loading} style={{marginTop:4}}>
            {mode==="login"?"Entrar":"Criar conta"}
          </Btn>
        </div>

        <p style={{color:C.gray400,fontSize:11,textAlign:"center",marginTop:20}}>
          Desenvolvido pelo Professor Felipe Cerqueira
        </p>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const ADMIN_EMAIL_ROOT = "flcerqueira@gmail.com";

const App = () => {
  const [user, setUser] = useState(null);
  const [role, setRole] = useState(null); // null | "admin" | "professional" | "pending"
  const [checking, setChecking] = useState(true);

  useEffect(()=>{
    waitForFirebase().then(()=>{
      const {onAuthStateChanged, signOut, doc, getDoc} = fbFns();
      onAuthStateChanged(fbAuth(), async (u) => {
        if(!u){ setUser(null); setRole(null); setChecking(false); return; }

        // Admin entra direto
        if(u.email===ADMIN_EMAIL_ROOT){
          setUser(u); setRole("admin"); setChecking(false); return;
        }

        // Verifica aprovação no Firestore
        try {
          const snap = await getDoc(doc(fbDb(),"users",u.uid));
          const status = snap.exists() ? snap.data().status : "pending";
          if(status==="approved"){
            setUser(u); setRole("professional");
          } else {
            // Não aprovado — desloga e mostra tela pendente
            await signOut(fbAuth());
            setUser(null); setRole("pending");
          }
        } catch(e){
          // Erro ao verificar — desloga por segurança
          await signOut(fbAuth());
          setUser(null); setRole(null);
        }
        setChecking(false);
      });
    });
  },[]);

  const handleLogout = async () => {
    const {signOut} = fbFns();
    await signOut(fbAuth());
    setUser(null); setRole(null);
  };

  if(checking) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.navy}}>
      <div style={{textAlign:"center"}}>
        <Logo size={40}/>
        <div className="spinner" style={{margin:"20px auto 0",width:28,height:28}}/>
      </div>
    </div>
  );

  if(role==="pending") return <PendingScreen onBack={()=>setRole(null)}/>;

  return user
    ?<Dashboard user={user} role={role} onLogout={handleLogout}/>
    :<Login onLogin={(u,r)=>{setUser(u);setRole(r);}}/>;
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
