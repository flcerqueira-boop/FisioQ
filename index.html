        {id:"q9",text:"A dor nas costas me incomodou nas últimas 2 semanas",options:["Nada","Pouco","Moderadamente","Muito","Extremamente"],scores:[0,0,0,0,1]},
      ]},
    ],
    calculate:(a)=>{
      const psy=["q5","q6","q7","q8","q9"];
      const total=Object.values(a).reduce((s,v)=>s+v,0);
      const ps=psy.reduce((s,k)=>s+(a[k]??0),0);
      let risk="Baixo";if(total>=4&&ps>=4)risk="Alto";else if(total>=4)risk="Médio";
      return{total,psychosocial:ps,risk};
    },
    renderResult:(r)=><StartBackResult result={r}/>
  }
};

// ─── FORMULÁRIO DO QUESTIONÁRIO ───────────────────────────────────────────────
const QuestionnaireForm = ({qId,patientName,onDone,onBack}) => {
  const q = QS[qId];
  const [answers, setAnswers] = useState({});
  const [sec, setSec] = useState(0);
  const allQs = q.sections.flatMap(s=>s.questions);
  const answered = Object.keys(answers).length;
  const section = q.sections[sec];
  const secDone = section.questions.every(x=>answers[x.id]!==undefined);
  const allDone = allQs.every(x=>answers[x.id]!==undefined);
  const progress = (answered/allQs.length)*100;
  const setA = (id,score) => setAnswers(p=>({...p,[id]:score}));
  const result = allDone ? q.calculate(answers) : null;

  if(allDone && result!==null){
    return (
      <div>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>✅</div>
          <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>Questionário concluído</h3>
          <p style={{color:C.gray400,fontSize:13}}>{patientName} • {q.name} • {new Date().toLocaleDateString("pt-BR")}</p>
        </div>
        <div style={{background:C.navy,borderRadius:16,padding:24,marginBottom:20}}>
          {q.renderResult(result)}
        </div>
        <div style={{background:`${q.color}11`,border:`1px solid ${q.color}22`,borderRadius:12,padding:14,marginBottom:20}}>
          <p style={{color:q.color,fontSize:12,fontWeight:600,marginBottom:2}}>ℹ️ Interpretação</p>
          <p style={{color:C.gray200,fontSize:12}}>{q.score_info}</p>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={onBack} variant="ghost" full>← Voltar</Btn>
          <Btn onClick={()=>onDone(result)} full>💾 Salvar resultado</Btn>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{color:q.color,fontWeight:600,fontSize:13}}>{section.title}</span>
          <span style={{color:C.gray400,fontSize:12}}>{answered}/{allQs.length}</span>
        </div>
        <div style={{background:C.navyLight,borderRadius:999,height:4}}>
          <div style={{width:`${progress}%`,height:"100%",background:q.color,borderRadius:999,transition:"width .3s"}}/>
        </div>
        {q.sections.length>1&&(
          <div style={{display:"flex",gap:6,marginTop:8}}>
            {q.sections.map((s,i)=>(
              <div key={i} style={{height:3,flex:1,background:i<sec?q.color:i===sec?`${q.color}66`:C.navyLight,borderRadius:999}}/>
            ))}
          </div>
        )}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12,maxHeight:"55vh",overflowY:"auto",paddingRight:4}}>
        {section.questions.map((ques,qi)=>(
          <div key={ques.id} style={{background:C.navy,border:`1.5px solid ${answers[ques.id]!==undefined?q.color+"55":C.navyLight}`,borderRadius:14,padding:16,transition:"border-color .2s"}}>
            <p style={{fontSize:13,lineHeight:1.6,marginBottom:12}}>
              <span style={{color:q.color,fontWeight:700,marginRight:6}}>{qi+1}.</span>{ques.text}
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {ques.options.map((opt,oi)=>{
                const sel = answers[ques.id]===ques.scores[oi];
                return (
                  <button key={oi} onClick={()=>setA(ques.id,ques.scores[oi])}
                    style={{background:sel?`${q.color}22`:C.navyMid,border:`1.5px solid ${sel?q.color:C.navyLight}`,borderRadius:8,padding:"8px 14px",color:sel?q.color:C.gray200,fontSize:12,fontFamily:"DM Sans,sans-serif",cursor:"pointer",textAlign:"left",transition:"all .15s",fontWeight:sel?600:400}}>
                    {opt}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:10,marginTop:16}}>
        {sec>0&&<Btn onClick={()=>setSec(s=>s-1)} variant="ghost">←</Btn>}
        <div style={{flex:1}}/>
        {sec<q.sections.length-1
          ?<Btn onClick={()=>setSec(s=>s+1)} disabled={!secDone}>Próxima seção →</Btn>
          :<Btn disabled={!allDone} style={{opacity:allDone?1:.4}}>Ver resultado ✓</Btn>
        }
      </div>
    </div>
  );
};

            <div key={s.label} style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:18}}>
              <div style={{fontSize:22}}>{s.icon}</div>
              <div style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:s.color,marginTop:6}}>{s.value}</div>
              <div style={{color:C.gray400,fontSize:12,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* lista de pacientes */}
        <div className="fu2">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,gap:10,flexWrap:"wrap"}}>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18}}>Pacientes</h2>
            <div style={{display:"flex",gap:10,flex:1,justifyContent:"flex-end",flexWrap:"wrap"}}>
              <input placeholder="Buscar paciente ou condição..." value={search} onChange={e=>setSearch(e.target.value)}
                style={{...inp,width:"auto",flex:1,maxWidth:260}}/>
              <Btn onClick={()=>setShowAddModal(true)} size="sm">+ Novo paciente</Btn>
            </div>
          </div>

          {filtered.length===0
            ?<div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:32,textAlign:"center",color:C.gray400}}>Nenhum paciente encontrado.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {filtered.map(p=>(
                <div key={p.id} onClick={()=>setSelectedPatient(p)}
                  style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:14,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"all .18s",gap:12}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=`${C.orange}66`;e.currentTarget.style.transform="translateX(2px)"}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.navyLight;e.currentTarget.style.transform="translateX(0)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:40,height:40,borderRadius:10,background:`${C.orange}22`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Syne,sans-serif",fontWeight:800,fontSize:17,color:C.orange,flexShrink:0}}>{p.name[0]}</div>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
                      <div style={{color:C.gray400,fontSize:12}}>{p.age} anos • {p.condition}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                    {p.evals[0]&&<Badge color={QS[p.evals[0].q]?.color||C.orange}>{QS[p.evals[0].q]?.name}</Badge>}
                    <span style={{color:C.gray400,fontSize:11}}>{p.evals.length} aval.</span>
                    <span style={{color:C.gray400,fontSize:16}}>→</span>
                  </div>
                </div>
              ))}
            </div>
          }
        </div>

        {/* painel admin */}
        {role==="admin"&&(
          <div className="fu3" style={{marginTop:24}}>
            <h2 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:18,marginBottom:14}}>Uso por Questionário</h2>
            <div style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:16,padding:22}}>
              {Object.values(QS).map(q=>{
                const count=patients.reduce((s,p)=>s+p.evals.filter(e=>e.q===q.id).length,0);
                const max=Math.max(...Object.values(QS).map(qq=>patients.reduce((s,p)=>s+p.evals.filter(e=>e.q===qq.id).length,0)),1);
                return (
                  <div key={q.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                    <span style={{fontSize:18,width:24}}>{q.icon}</span>
                    <span style={{width:90,fontSize:12,color:C.gray200}}>{q.name}</span>
                    <div style={{flex:1,background:C.navyLight,borderRadius:999,height:6}}>
                      <div style={{width:`${(count/max)*100}%`,height:"100%",background:q.color,borderRadius:999,transition:"width .6s"}}/>
                    </div>
                    <span style={{color:q.color,fontWeight:700,fontSize:13,width:24,textAlign:"right"}}>{count}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* modal novo paciente */}
      {showAddModal&&(
        <Modal title="Novo paciente" onClose={()=>setShowAddModal(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input placeholder="Nome completo *" value={newP.name} onChange={e=>setNewP(p=>({...p,name:e.target.value}))} style={inp}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <input placeholder="Idade" type="number" value={newP.age} onChange={e=>setNewP(p=>({...p,age:e.target.value}))} style={inp}/>
              <select value={newP.gender} onChange={e=>setNewP(p=>({...p,gender:e.target.value}))} style={{...inp,cursor:"pointer"}}>
                <option value="F">Feminino</option>
                <option value="M">Masculino</option>
              </select>
            </div>
            <input placeholder="Condição / diagnóstico" value={newP.condition} onChange={e=>setNewP(p=>({...p,condition:e.target.value}))} style={inp}/>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <Btn onClick={()=>setShowAddModal(false)} variant="ghost" full>Cancelar</Btn>
              <Btn onClick={addPatient} disabled={!newP.name.trim()} full>Cadastrar paciente</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// ─── LOGIN ────────────────────────────────────────────────────────────────────
const Login = ({onLogin}) => {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [role, setRole] = useState("professional");
  const inp = {background:C.navyLight,border:`1.5px solid ${C.navyLight}`,borderRadius:10,padding:"12px 16px",color:C.white,fontSize:14,fontFamily:"DM Sans,sans-serif",width:"100%",outline:"none"};
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(ellipse at 30% 60%,${C.navyLight} 0%,${C.navy} 65%)`,padding:16}}>
      <div className="fu" style={{background:C.navyMid,border:`1px solid ${C.navyLight}`,borderRadius:20,padding:36,width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <Logo size={38}/>
          <p style={{color:C.gray400,fontSize:12,marginTop:8}}>Questionários Funcionais em Fisioterapia</p>
        </div>
        <div style={{display:"flex",gap:6,background:C.navy,borderRadius:11,padding:4,marginBottom:22}}>
          {[["professional","Profissional"],["admin","Admin"]].map(([v,l])=>(
            <button key={v} onClick={()=>setRole(v)}
              style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",background:role===v?C.orange:"transparent",color:role===v?C.white:C.gray400,fontWeight:600,fontSize:13,fontFamily:"DM Sans,sans-serif",transition:"all .18s"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input style={inp} placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)}/>
          <input style={inp} placeholder="Senha" type="password" value={pass} onChange={e=>setPass(e.target.value)}/>
          <Btn onClick={()=>onLogin(role)} size="lg" full style={{marginTop:4}}>Entrar</Btn>
        </div>
        <p style={{color:C.gray400,fontSize:11,textAlign:"center",marginTop:16}}>
          Desenvolvido pelo Professor Felipe Cerqueira
        </p>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState("login");
  const [role, setRole] = useState(null);
  const [patients, setPatients] = useState(INIT_PATIENTS);
  return (
    <>
      {screen==="login"&&<Login onLogin={r=>{setRole(r);setScreen("dashboard");}}/>}
      {screen==="dashboard"&&<Dashboard role={role} onLogout={()=>{setRole(null);setScreen("login");}} patients={patients} setPatients={setPatients}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
